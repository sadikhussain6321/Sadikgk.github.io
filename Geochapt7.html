<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛏️ खनिज एवं ऊर्जा संसाधन MCQ | Sadik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e3c2c, #2d5a3b);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        /* वॉटरमार्क - Sadik */
        body::before {
            content: "Sadik 😊";
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 60px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.08);
            pointer-events: none;
            z-index: 999;
            transform: rotate(-15deg);
            font-family: 'Arial', sans-serif;
            letter-spacing: 5px;
            white-space: nowrap;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 950px;
            margin: 0 auto;
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #1e4a2f;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .header h2 {
            font-size: 1.6rem;
        }
        .timer-box {
            background: #e67e22;
            padding: 10px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: white;
            font-family: monospace;
        }
        .name-section {
            padding: 20px;
            background: #eef2fa;
            text-align: center;
            border-bottom: 2px solid #ccc;
        }
        .name-section input {
            padding: 10px 18px;
            font-size: 18px;
            width: 70%;
            max-width: 280px;
            border: 1px solid #aaa;
            border-radius: 40px;
            outline: none;
            text-align: center;
        }
        .name-section button {
            padding: 10px 22px;
            font-size: 18px;
            background: #1e4a2f;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-left: 8px;
        }
        .quiz-area {
            padding: 15px;
            display: none;
            max-height: 65vh;
            overflow-y: auto;
        }
        .question-card {
            background: #fefefe;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 14px;
            border-left: 6px solid #1e4a2f;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .question-text {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .options label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            background: #eef2f5;
            padding: 4px 10px;
            border-radius: 25px;
            cursor: pointer;
        }
        input[type="radio"] {
            accent-color: #1e4a2f;
        }
        .submit-btn {
            display: block;
            width: 70%;
            margin: 25px auto;
            padding: 12px;
            font-size: 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .result-area {
            padding: 20px;
            background: #e9f0f5;
            text-align: center;
            border-top: 2px solid #ccc;
            display: none;
        }
        .score-text {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            color: #1e4a2f;
        }
        .correct-ans {
            background-color: #d4edda !important;
            border-left: 6px solid #28a745 !important;
        }
        .wrong-ans {
            background-color: #f8d7da !important;
            border-left: 6px solid #dc3545 !important;
        }
        footer {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            background: #f0f2f5;
            color: gray;
        }
        @media (max-width: 650px) {
            .options { flex-direction: column; gap: 6px; }
            .question-text { font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>⛏️ खनिज एवं ऊर्जा संसाधन</h2>
        <p>कक्षा 12 भूगोल | 73 प्रश्न | 25 मिनट</p>
    </div>
    <div class="timer-box" id="timerDisplay">⏱️ 25:00</div>

        <div class="score-text" id="scoreText"></div>

    </div>
    <footer>© Sadik | ऑनलाइन टेस्ट सीरीज | खनिज एवं ऊर्जा</footer>
</div>

    function updateTimerUI() {
        timerDisplay.innerText = `⏱️ ${formatTime(timeLeft)}`;
        if(timeLeft <= 0 && testStarted) {
            clearInterval(timerInterval);
            alert("समय समाप्त! टेस्ट सबमिट हो रहा है।");
            submitTest();
        }
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(timeLeft > 0 && testStarted) {
                timeLeft--;
                updateTimerUI();
            } else if(timeLeft <= 0 && testStarted) {
                clearInterval(timerInterval);
                submitTest();
            }
        }, 1000);
    }

    function renderQuestions() {
        questionsContainer.innerHTML = '';
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.setAttribute('data-qid', idx);
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `${idx+1}. ${q.text}`;
            card.appendChild(qText);
            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';
            const letters = ['A','B','C','D'];
            q.options.forEach((opt, oi) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = letters[oi];
                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${letters[oi]}: ${opt}`));
                optsDiv.appendChild(label);
            });
            card.appendChild(optsDiv);
            questionsContainer.appendChild(card);
        });
    }

    function submitTest() {
        if(!testStarted) return;
        clearInterval(timerInterval);
        testStarted = false;
        let score = 0;
        for(let i=0; i<questions.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? selected.value : null;
            const correctAns = questions[i].correct;
            const card = document.querySelector(`.question-card[data-qid='${i}']`);
            if(!card) continue;
            card.classList.remove('correct-ans','wrong-ans');
            if(userAns === correctAns) {
                score++;
                card.classList.add('correct-ans');
            } else {
                card.classList.add('wrong-ans');
                let correctLetter = correctAns;
                let correctText = questions[i].options[correctLetter.charCodeAt(0)-65];
                let hint = document.createElement('div');
                hint.style.fontSize = "11px";
                hint.style.marginTop = "5px";
                hint.style.color = "#b52b2b";
                hint.innerHTML = `✔️ सही: ${correctLetter}: ${correctText}`;
                const old = card.querySelector('.correct-hint');
                if(old) old.remove();
                hint.classList.add('correct-hint');
                card.appendChild(hint);
            }
        }
        quizArea.style.display = 'none';
        resultArea.style.display = 'block';
        document.getElementById('studentNameDisplay').innerHTML = `👤 <strong>${studentName}</strong>`;
        document.getElementById('scoreText').innerHTML = `🏆 ${score} / ${questions.length}`;
    }

    function startTest() {
        const nameInput = document.getElementById('studentName');
        if(!nameInput.value.trim()) {
            alert("कृपया अपना नाम लिखें!");
            return;
        }
        studentName = nameInput.value.trim();
        testStarted = true;
        timeLeft = 25*60;
        updateTimerUI();
        startTimer();
        nameSection.style.display = 'none';
        quizArea.style.display = 'block';
        resultArea.style.display = 'none';
        renderQuestions();
    }

    function restartTest() {
        clearInterval(timerInterval);
        testStarted = false;
        nameSection.style.display = 'block';
        quizArea.style.display = 'none';
        resultArea.style.display = 'none';
        document.getElementById('studentName').value = '';
        timeLeft = 25*60;
        updateTimerUI();
    }

    startBtn.addEventListener('click', startTest);
    submitBtn.addEventListener('click', () => { if(confirm("सबमिट करें?")) submitTest(); });
    restartBtn.addEventListener('click', restartTest);
    updateTimerUI();
</script>
</body>
</html>
